<head>

  <link rel="stylesheet" href="css/styles.css">

</head>

<body>
  <header>
    <nav class="main-nav" aria-label="Main navigation">
      <div class="logo">
        <img src="assets/images/resume.png" alt="App Logo" />
        <div>
          <h1 class="site-title">Olivier César Muvuzankwaya</h1>

  <main>
    <section aria-labelledby="contact-heading">
      <h2 id="contact-heading">Contact Me</h2>
      <form style="width:650px" ; id="contact-form" action="#" method="post" novalidate>
        <label for="name">Name</label><br>
        <input id="name" name="name" type="text" required><br>
        <label for="email">Email</label><br>
        <input id="email" name="email" type="email" required><br>
        <label for="message">Message <span id="char-count">(0 / 500)</span></label><br>
        <textarea id="message" name="message" rows="6" cols="5" maxlength="500" required></textarea><br>
        <button type="submit">Send Message</button>
      </form>
      <br>
      <div id="form-result" role="status" aria-live="polite"></div>
    </section>
  </main>
